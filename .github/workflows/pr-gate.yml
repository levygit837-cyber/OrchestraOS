name: PR Gate

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # PR Gate: blocks merge if ANY check fails.
  # Each job has a clear name so the failure reason is visible in the PR UI.
  # ---------------------------------------------------------------------------

  build:
    name: PR Gate / Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...

  vet:
    name: PR Gate / go vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...

  unit-tests:
    name: PR Gate / Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./... -race -count=1

  lint:
    name: PR Gate / Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.6
          args: --timeout=5m

  # ===========================================================================
  # ARCHITECTURE GATES — These are the critical rules that must never be broken.
  # ===========================================================================

  golden-rule-modules:
    name: PR Gate / Golden Rule — No Cross-Module Imports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: |
          echo "FAILURE REASON: A module in internal/modules/* imported another module."
          echo "Modules MUST be autonomous (ADR-0030)."
          go test ./tests/architecture/... -run TestModuleBoundaries -v -count=1

  golden-rule-importers:
    name: PR Gate / Golden Rule — Only Allowed Packages Import Modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: |
          echo "FAILURE REASON: A package outside bootstrap/cmd imported internal/modules/*."
          echo "Only bootstrap (DI wiring) and cmd (entrypoint) may import modules."
          go test ./tests/architecture/... -run TestOnlyCoordinationImportsModules -v -count=1

  golden-rule-bootstrap-di:
    name: PR Gate / Golden Rule — cmd Uses Bootstrap DI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: |
          echo "FAILURE REASON: cmd/ instantiated a service/repository directly."
          echo "cmd/ MUST use bootstrap.* factories (ADR-0030)."
          go test ./tests/architecture/... -run TestCmdBootstrapDI -v -count=1

  module-structure:
    name: PR Gate / Module Structure Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: |
          echo "FAILURE REASON: A module is missing mandatory files (doc.go, README.md, etc.)."
          ./scripts/go/verify-module-structure.sh

  architecture-purity:
    name: PR Gate / Repository Purity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: |
          echo "FAILURE REASON: Business logic detected in repository.go."
          echo "Repositories must be pure CRUD (ADR-0030)."
          go test ./tests/architecture/... -run TestRepositoryPurity -v -count=1

  architecture-method-names:
    name: PR Gate / Repository Method Names
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: |
          echo "FAILURE REASON: Non-CRUD method name in repository.go."
          go test ./tests/architecture/... -run TestRepositoryMethodNames -v -count=1

  domain-integrity:
    name: PR Gate / Domain Import Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: |
          echo "FAILURE REASON: Shared entity types missing from internal/domain/."
          echo "All cross-module types must live in internal/domain (ADR-0030)."
          go test ./tests/architecture/... -run TestDomainImportIntegrity -v -count=1

  service-decomposition:
    name: PR Gate / Service Decomposition
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: |
          echo "FAILURE REASON: service_<sub>.go exists without service.go > 300 lines."
          go test ./tests/architecture/... -run TestServiceDecomposition -v -count=1

  anomaly-code:
    name: PR Gate / Anomaly — Code Anti-Patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: |
          echo "FAILURE REASON: Code anti-pattern detected (panic, fmt.Println, inline SQL, ignored errors)."
          go test ./tests/architecture/... -run TestCodeAnomalies -v -count=1
