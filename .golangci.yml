run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gofmt
    - goimports
    - govet
    - staticcheck
    - ineffassign
    - misspell
    - nolintlint
    - gocritic
    - forbidigo

linters-settings:
  forbidigo:
    forbid:
      - p: "fmt\\.Println"
        msg: "fmt.Println is forbidden in production code; use structured logging"
      - p: "fmt\\.Printf"
        msg: "fmt.Printf is forbidden in production code; use structured logging"
      - p: "panic\\("
        msg: "panic is forbidden; return errors instead"

  errcheck:
    check-blank: true

  govet:
    enable-all: true

  misspell:
    locale: US

  nolintlint:
    require-explanation: true
    require-specific: true

issues:
  exclude-dirs:
    - migrations
    - vendor
    - .go
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
