run:
  timeout: 5m
  skip-dirs:
    - migrations
    - vendor
    - .go

linters:
  enable:
    - errcheck
    - gofmt
    - goimports
    - govet
    - staticcheck
    - ineffassign
    - misspell
    - nolintlint
    - gocritic
    - depguard
    - forbidigo

linters-settings:
  depguard:
    rules:
      forbid-legacy-packages:
        deny:
          - pkg: "github.com/levygit837-cyber/OrchestraOS/internal/services"
            desc: "internal/services was removed during modularisation"
          - pkg: "github.com/levygit837-cyber/OrchestraOS/internal/repository"
            desc: "internal/repository was removed during modularisation"
          - pkg: "github.com/levygit837-cyber/OrchestraOS/internal/prompting"
            desc: "internal/prompting was removed during modularisation"
          - pkg: "github.com/levygit837-cyber/OrchestraOS/internal/db"
            desc: "internal/db was removed during modularisation"
      forbid-service-imports:
        deny:
          - pkg: "github.com/levygit837-cyber/OrchestraOS/internal/modules/*/service.go"
            desc: "Do not import service files directly; use DI interfaces or core/orchestration"

  forbidigo:
    forbid:
      - p: "fmt\\.Println"
        msg: "fmt.Println is forbidden in production code; use structured logging"
      - p: "fmt\\.Printf"
        msg: "fmt.Printf is forbidden in production code; use structured logging"
      - p: "panic\\("
        msg: "panic is forbidden; return errors instead"

  errcheck:
    check-blank: true

  govet:
    enable-all: true

  misspell:
    locale: US

  nolintlint:
    require-explanation: true
    require-specific: true

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
