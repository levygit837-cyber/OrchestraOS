run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - gofmt
    - goimports
    - govet
    - staticcheck
    - ineffassign
    - gocritic
  disable:
    # TODO: re-enable after fixing existing violations in a dedicated lint PR
    - errcheck
    - forbidigo
    - misspell
    - unused

linters-settings:
  govet:
    enable-all: true
    disable:
      - shadow
      - fieldalignment

issues:
  exclude-dirs:
    - migrations
    - vendor
    - .go
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
