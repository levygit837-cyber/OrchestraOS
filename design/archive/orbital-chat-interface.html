<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORBITAL // Multi-Agent Nexus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-void: 5, 5, 5;
            --accent-sage: 134, 239, 172;
            --accent-coral: 251, 146, 60;
            --accent-lavender: 192, 132, 252;
            --accent-slate: 148, 163, 184;
            --glass-border: rgba(255, 255, 255, 0.06);
            --glass-bg: rgba(5, 5, 5, 0.4);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: rgb(var(--bg-void));
            color: #ececf1;
            overflow: hidden;
            overscroll-behavior: none;
        }

        .font-mono { font-family: 'Space Mono', monospace; }

        /* Liquid Glass Physics */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 
                inset 0 1px 0 rgba(255,255,255,0.05),
                0 20px 40px -10px rgba(0,0,0,0.5);
        }

        /* Starfield Parallax Layers */
        #starfield {
            position: absolute;
            inset: -50%;
            width: 200%;
            height: 200%;
            pointer-events: none;
            z-index: 0;
            perspective: 1000px;
        }
        .star-layer {
            position: absolute;
            inset: 0;
            background: transparent;
        }
        @keyframes drift {
            from { transform: rotate(0deg) translateZ(-50px); }
            to { transform: rotate(360deg) translateZ(-50px); }
        }

        /* Orbital Mechanics */
        .system-stage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 10;
        }

        .orbit-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 1px dashed rgba(255, 255, 255, 0.08);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Gravity Well Intersection Effect */
        body.gravity-well-active .orbit-ring-middle {
            border-radius: 40% 60% 60% 40% / 40% 50% 50% 60%;
            border-color: rgba(var(--accent-coral), 0.3);
            box-shadow: inset 0 0 40px rgba(var(--accent-coral), 0.1);
        }
        body.gravity-well-active .orbit-ring-outer {
            border-radius: 60% 40% 40% 60% / 50% 40% 60% 50%;
            border-color: rgba(var(--accent-sage), 0.3);
            box-shadow: inset 0 0 40px rgba(var(--accent-sage), 0.1);
        }

        .agent-node {
            position: absolute;
            top: 50%;
            left: 50%;
            /* --r and --a set via inline style for specific positioning */
            transform: translate(-50%, -50%) rotate(var(--a)) translateY(var(--r)) rotate(calc(-1 * var(--a)));
            pointer-events: auto;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 20;
        }

        /* @Mention Scale Override */
        body.mention-mode .agent-node {
            transform: translate(-50%, -50%) rotate(var(--a)) translateY(var(--r)) rotate(calc(-1 * var(--a))) scale(1.15);
        }
        body.mention-mode .agent-node .agent-aura {
            opacity: 0.8;
            transform: scale(1.4);
        }

        .agent-aura {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            filter: blur(8px);
            opacity: 0.3;
            transition: all 0.4s ease;
            z-index: -1;
        }

        /* Status Animations */
        @keyframes pulse-working {
            0% { box-shadow: 0 0 0 0 rgba(var(--status-color), 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(var(--status-color), 0); }
            100% { box-shadow: 0 0 0 0 rgba(var(--status-color), 0); }
        }

        .status-working {
            animation: pulse-working 2s infinite;
        }

        /* Message Physics */
        .message-packet {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: 0 50%;
            pointer-events: none;
            opacity: 0;
            z-index: 15;
            display: flex;
            align-items: center;
        }

        @keyframes packet-emit {
            0% { 
                transform: translate(-50%, -50%) scale(0.5); 
                opacity: 0; 
                top: 50%; 
                left: 50%;
            }
            15% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            80% { opacity: 0.8; }
            100% { 
                transform: var(--target-transform); 
                opacity: 0;
                filter: blur(2px);
            }
        }
        
        .run-emission {
            animation: packet-emit 4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body>

    <!-- Starfield Background -->
    <div id="starfield">
        <div class="star-layer" style="background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 50px 50px; animation: drift 120s linear infinite;"></div>
        <div class="star-layer" style="background: radial-gradient(circle at 30% 70%, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 80px 80px; animation: drift 180s linear infinite reverse;"></div>
    </div>

    <!-- Orbital System Stage -->
    <div class="system-stage" id="orbital-arena">
        
        <!-- Connection Lines SVG Layer -->
        <svg id="connection-layer" class="absolute inset-0 w-full h-full pointer-events-none z-5">
            <path id="gravity-line" d="" stroke="rgba(255,255,255,0.15)" stroke-width="1" fill="none" style="opacity: 0; transition: opacity 0.5s ease;"></path>
        </svg>

        <!-- Orbit Rings -->
        <div class="orbit-ring orbit-ring-inner" style="width: 200px; height: 200px;"></div>
        <div class="orbit-ring orbit-ring-middle" style="width: 350px; height: 350px;"></div>
        <div class="orbit-ring orbit-ring-outer" style="width: 500px; height: 500px;"></div>

        <!-- Core Node (You) -->
        <div class="agent-node" style="--r: 0px; --a: 0deg;">
            <div class="relative">
                <div class="w-16 h-16 rounded-full bg-gradient-to-br from-white/20 to-white/5 backdrop-blur-md border border-white/20 flex items-center justify-center shadow-lg">
                    <span class="text-xs font-bold tracking-wider">CORE</span>
                </div>
                <div class="agent-aura" style="background: rgba(255,255,255,0.2);"></div>
            </div>
        </div>

        <!-- Agent 1: Logic (45deg, 175px) -->
        <div class="agent-node" style="--r: -175px; --a: 45deg;" onclick="openAgentPanel('logic')">
            <div class="relative">
                <div class="w-12 h-12 rounded-full glass-panel flex items-center justify-center" style="--status-color: 134, 239, 172;">
                    <i class="ph ph-brain text-emerald-300 text-xl"></i>
                </div>
                <div class="agent-aura status-working" style="background: rgba(134, 239, 172, 0.4); --status-color: 134, 239, 172;"></div>
            </div>
        </div>

        <!-- Agent 2: Vision (135deg, 175px) -->
        <div class="agent-node" style="--r: -175px; --a: 135deg;" onclick="openAgentPanel('vision')">
            <div class="relative">
                <div class="w-12 h-12 rounded-full glass-panel flex items-center justify-center">
                    <i class="ph ph-eye text-cyan-300 text-xl"></i>
                </div>
                <div class="agent-aura" style="background: rgba(6, 182, 212, 0.3);"></div>
            </div>
        </div>

        <!-- Agent 3: Data (225deg, 175px) -->
        <div class="agent-node" style="--r: -175px; --a: 225deg;" onclick="openAgentPanel('data')">
            <div class="relative">
                <div class="w-12 h-12 rounded-full glass-panel flex items-center justify-center">
                    <i class="ph ph-database text-purple-300 text-xl"></i>
                </div>
                <div class="agent-aura" style="background: rgba(192, 132, 252, 0.3);"></div>
            </div>
        </div>

        <!-- Agent 4: Synthesis (315deg, 175px) -->
        <div class="agent-node" style="--r: -175px; --a: 315deg;" onclick="openAgentPanel('synthesis')">
            <div class="relative">
                <div class="w-12 h-12 rounded-full glass-panel flex items-center justify-center">
                    <i class="ph ph-sparkle text-amber-300 text-xl"></i>
                </div>
                <div class="agent-aura" style="background: rgba(251, 146, 60, 0.3);"></div>
            </div>
        </div>

    </div>

    <!-- Top Status Bar -->
    <div class="fixed top-0 left-0 right-0 h-12 glass-panel z-30 flex items-center justify-between px-6">
        <div class="flex items-center gap-4">
            <span class="text-xs font-mono text-white/60">NEXUS CORE // ONLINE</span>
            <span class="text-xs font-mono text-emerald-400">ACTIVE NODES 04</span>
        </div>
        <div class="flex items-center gap-6 text-xs font-mono text-white/60">
            <span>DATA QUEUE 00</span>
            <span>SYS LOAD 12%</span>
        </div>
    </div>

    <!-- Bottom Command Input -->
    <div class="fixed bottom-0 left-0 right-0 p-4 z-30" id="command-container">
        <div class="max-w-2xl mx-auto">
            <div class="glass-panel rounded-2xl p-4">
                <div class="flex items-center gap-3">
                    <span class="text-xs font-mono text-white/40">You (Core)</span>
                    <input type="text" id="cmd-input" class="flex-1 bg-transparent border-none outline-none text-sm text-white placeholder-white/30" placeholder="Signal agents with @mention..." autocomplete="off">
                    <button class="text-white/40 hover:text-white transition-colors">
                        <i class="ph ph-paper-plane-right text-lg"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Agent Flyout Panel -->
    <div id="agent-panel" class="fixed right-0 top-12 bottom-16 w-80 glass-panel z-40 transform translate-x-full transition-transform duration-500 ease-out p-6">
        <div class="flex items-center justify-between mb-6">
            <h3 class="text-sm font-medium text-white/80" id="panel-title">Agent Details</h3>
            <button onclick="closeAgentPanel()" class="text-white/40 hover:text-white transition-colors">
                <i class="ph ph-x text-lg"></i>
            </button>
        </div>
        <div class="space-y-4">
            <div class="p-4 rounded-xl bg-white/5 border border-white/10">
                <div class="text-xs font-mono text-white/40 mb-1">STATUS</div>
                <div class="text-sm text-white/80" id="panel-status">Processing...</div>
            </div>
            <div class="p-4 rounded-xl bg-white/5 border border-white/10">
                <div class="text-xs font-mono text-white/40 mb-1">CURRENT TASK</div>
                <div class="text-sm text-white/80" id="panel-task">Analyzing request patterns</div>
            </div>
            <div class="p-4 rounded-xl bg-white/5 border border-white/10">
                <div class="text-xs font-mono text-white/40 mb-1">UPTIME</div>
                <div class="text-sm text-white/80" id="panel-uptime">4h 23m</div>
            </div>
        </div>
    </div>

    <!-- @Mention Flyout Menu -->
    <div id="mention-flyout" class="fixed bottom-20 left-1/2 -translate-x-1/2 glass-panel rounded-xl p-2 z-35 opacity-0 translate-y-4 pointer-events-none transition-all duration-300">
        <div class="space-y-1">
            <div class="px-3 py-2 rounded-lg hover:bg-white/10 cursor-pointer text-sm text-white/80 flex items-center gap-2">
                <i class="ph ph-brain text-emerald-300"></i>
                <span>@A1_LOGIC</span>
            </div>
            <div class="px-3 py-2 rounded-lg hover:bg-white/10 cursor-pointer text-sm text-white/80 flex items-center gap-2">
                <i class="ph ph-eye text-cyan-300"></i>
                <span>@A2_VISION</span>
            </div>
            <div class="px-3 py-2 rounded-lg hover:bg-white/10 cursor-pointer text-sm text-white/80 flex items-center gap-2">
                <i class="ph ph-database text-purple-300"></i>
                <span>@A3_DATA</span>
            </div>
            <div class="px-3 py-2 rounded-lg hover:bg-white/10 cursor-pointer text-sm text-white/80 flex items-center gap-2">
                <i class="ph ph-sparkle text-amber-300"></i>
                <span>@A4_SYNTHESIS</span>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Auto-resize textarea-like input ---
        const input = document.getElementById('cmd-input');
        const flyout = document.getElementById('mention-flyout');

        input.addEventListener('input', function(e) {
            this.style.height = 'auto';
            this.style.height = e.target.scrollHeight + 'px';

            // Mention logic
            const val = e.target.value;
            if (val.endsWith('@') || (val.includes('@') && val.split('@').pop().length < 5)) {
                document.body.classList.add('mention-mode');
                flyout.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
            } else {
                document.body.classList.remove('mention-mode');
                flyout.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
            }
        });

        // Demo logic: simulate a data flow message after short delay
        setTimeout(() => {
            simulateMessageFlow(
                {x: '50%', y: '50%'}, // From Core
                'translate(-50%, -50%) rotate(45deg) translateY(-175px) rotate(-45deg)', // To Agent 1
                'emerald'
            );
        }, 2000);

        // Continuous slow planetary drift (updating CSS var --a slightly)
        const agents = document.querySelectorAll('.agent-node');
        agents.forEach(agent => {
            let currentAngle = parseFloat(agent.style.getPropertyValue('--a')) || 0;
            // randomize drift speed & direction slightly
            const driftSpeed = (Math.random() * 0.05 + 0.02) * (Math.random() > 0.5 ? 1 : -1);
            
            setInterval(() => {
                currentAngle += driftSpeed;
                agent.style.setProperty('--a', `${currentAngle}deg`);
            }, 50); // 20fps for smooth enough subtle UI drift
        });

        // Simulate sporadic collaboration (Gravity Well)
        setInterval(() => {
            const body = document.body;
            if(Math.random() > 0.7) {
                body.classList.add('gravity-well-active');
                drawConnectionLine();
                setTimeout(() => {
                    body.classList.remove('gravity-well-active');
                    document.getElementById('gravity-line').style.opacity = '0';
                }, 4000);
            }
        }, 8000);
    </script>

    <script>
        // --- 3. Interaction Logic ---
        const panel = document.getElementById('agent-panel');
        
        function openAgentPanel(agentType) {
            // In a real app, populate data based on agentType.
            // For now, just slide it in.
            panel.classList.remove('translate-x-full');
            // Hide bottom input slightly when panel opens for cleaner view on desktop
            document.getElementById('command-container').style.transform = 'translate(-50%, 150%)';
        }

        function closeAgentPanel() {
            panel.classList.add('translate-x-full');
            document.getElementById('command-container').style.transform = 'translate(-50%, 0)';
        }

        // --- 4. Visual Effects (Messages & Lines) ---
        function simulateMessageFlow(startObj, targetTransformStr, colorConfig) {
            const arena = document.getElementById('orbital-arena');
            const pkt = document.createElement('div');
            pkt.className = 'message-packet run-emission';
            
            // Set dynamic vars for animation
            pkt.style.setProperty('--target-transform', targetTransformStr);
            
            // Visual structure of the message
            pkt.innerHTML = `
                <div class="px-3 py-1 bg-white/10 backdrop-blur-md rounded-full border border-white/20 shadow-[0_0_15px_rgba(255,255,255,0.1)] flex items-center gap-2">
                    <i class="ph ph-waveform text-white text-xs"></i>
                    <span class="font-mono text-[10px] text-white">SYS_FRAG</span>
                </div>
                <div class="w-12 h-[1px] bg-gradient-to-r from-white/40 to-transparent"></div>
            `;
            
            arena.appendChild(pkt);
            
            // Cleanup
            setTimeout(() => {
                pkt.remove();
            }, 4000);
        }

        function drawConnectionLine() {
            // Simplified drawing connecting Agent 1 and Agent 2 via an SVG curve
            const line = document.getElementById('gravity-line');
            // Hardcoded coordinates relative to middle for demo
            // In production, use getBoundingClientRect() to map exact DOM positions to SVG local space.
            const path = `M 400 250 Q 550 400 700 600`; // Abstract mock curve over center
            // Actual calculation requires complex offset mapping due to viewport vs relative absolute positioning.
            // For high-end single-file demo, drawing an elegant geometric shape inside the SVG is safer.
            line.setAttribute('d', 'M 20 -200 Q 150 0 300 150'); // Relative to center of stage due to transforms on parent? Actually SVG is absolute full width.
            
            // Simpler approach for responsive single-file:
            // Find screen coords of both agents.
            const a1 = document.querySelectorAll('.agent-node')[0].getBoundingClientRect();
            const a2 = document.querySelectorAll('.agent-node')[1].getBoundingClientRect();
            
            const svg = document.getElementById('connection-layer');
            const svgRect = svg.getBoundingClientRect();

            const p1x = a1.left + a1.width/2 - svgRect.left;
            const p1y = a1.top + a1.height/2 - svgRect.top;
            const p2x = a2.left + a2.width/2 - svgRect.left;
            const p2y = a2.top + a2.height/2 - svgRect.top;

            // Curve through center core
            const cx = svgRect.width / 2;
            const cy = svgRect.height / 2;

            line.setAttribute('d', `M ${p1x} ${p1y} Q ${cx} ${cy} ${p2x} ${p2y}`);
            line.style.opacity = '1';
        }

        // Close panel on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeAgentPanel();
        });

    </script>
</body>
</html>
