<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrchestraOS — Canvas v4</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --bg-panel: #0C0C0C;
            --bg-hover: #121212;
            --border: #1C1C1C;
            --border-light: #292524;
            --text: #A8A29E;
            --text-dim: #57534E;
            --text-bright: #E7E5E4;
            --accent: #F59E0B;
            --accent-dim: #92400E;
            --green: #22C55E;
            --green-dim: #14532D;
            --red: #EF4444;
            --red-dim: #7F1D1D;
            --blue: #3B82F6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            font-size: 13px;
            line-height: 1.6;
            height: 100dvh;
            overflow: hidden;
        }
        ::selection { background: var(--accent-dim); color: var(--text-bright); }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 0; }

        .app { display: flex; height: 100dvh; flex-direction: column; }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-panel);
            flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-title { font-weight: 600; color: var(--text-bright); font-size: 14px; letter-spacing: -0.3px; }
        .header-title span { color: var(--accent); }
        .header-sub { color: var(--text-dim); font-size: 11px; }

        .tabs { display: flex; gap: 0; }
        .tab {
            padding: 4px 12px;
            font-size: 12px;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--text-dim);
            font-family: inherit;
            border-bottom: 1px solid transparent;
            transition: all 0.15s;
        }
        .tab:hover { color: var(--text); }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

        .main { flex: 1; display: flex; overflow: hidden; }
        .content { flex: 1; overflow-y: auto; padding: 0; }

        .log-entry {
            display: flex;
            gap: 12px;
            padding: 3px 16px;
            border-left: 2px solid transparent;
            transition: background 0.1s;
        }
        .log-entry:hover { background: var(--bg-hover); }
        .log-timestamp {
            color: var(--text-dim);
            font-size: 11px;
            white-space: nowrap;
            min-width: 70px;
            padding-top: 1px;
        }
        .log-type {
            color: var(--accent);
            font-size: 11px;
            min-width: 130px;
            white-space: nowrap;
        }
        .log-type.type-intake { color: var(--blue); }
        .log-type.type-task { color: var(--green); }
        .log-type.type-run { color: var(--text); }
        .log-type.type-session { color: var(--accent); }
        .log-type.type-error { color: var(--red); }
        .log-msg { color: var(--text-bright); }
        .log-msg .dim { color: var(--text); }
        .log-msg .bright { color: var(--text-bright); font-weight: 500; }

        .sep { border-top: 1px solid var(--border); margin: 8px 16px; }
        .sep-label {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            color: var(--text-dim);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .dag-container {
            padding: 8px 16px 16px;
            font-size: 13px;
            line-height: 1.8;
            overflow-x: auto;
        }
        .dag-line { white-space: pre; font-family: 'JetBrains Mono', monospace; }
        .dag-status-done { color: var(--green); }
        .dag-status-running { color: var(--accent); }
        .dag-status-pending { color: var(--text-dim); }
        .dag-status-failed { color: var(--red); }
        .dag-id { color: var(--text-dim); }
        .dag-title { color: var(--text-bright); font-weight: 500; }

        .active-strip {
            display: flex;
            gap: 16px;
            padding: 8px 16px;
            border-top: 1px solid var(--border);
            background: var(--bg-panel);
            flex-shrink: 0;
            overflow-x: auto;
        }
        .active-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 10px;
            border: 1px solid var(--border-light);
            cursor: pointer;
            transition: border-color 0.15s;
            white-space: nowrap;
        }
        .active-item:hover { border-color: var(--accent); }
        .active-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .active-name { color: var(--text-bright); font-size: 12px; }
        .active-meta { color: var(--text-dim); font-size: 11px; }

        .input-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-top: 1px solid var(--border);
            background: var(--bg-panel);
            flex-shrink: 0;
        }
        .input-prompt { color: var(--accent); font-weight: 600; }
        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-bright);
            font-family: inherit;
            font-size: 13px;
        }
        .input-field::placeholder { color: var(--text-dim); }

        .drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 50;
        }
        .drawer-overlay.open { opacity: 1; pointer-events: auto; }
        .drawer {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 420px;
            max-width: 90vw;
            background: var(--bg-panel);
            border-left: 1px solid var(--border-light);
            transform: translateX(100%);
            transition: transform 0.25s ease;
            z-index: 51;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .drawer.open { transform: translateX(0); }
        .drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }
        .drawer-title { color: var(--text-bright); font-weight: 600; font-size: 13px; }
        .drawer-close {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-family: inherit;
            font-size: 16px;
            padding: 2px 6px;
        }
        .drawer-close:hover { color: var(--text-bright); }
        .drawer-body { flex: 1; overflow-y: auto; padding: 12px 16px; }
        .drawer-section { margin-bottom: 16px; }
        .drawer-label {
            color: var(--text-dim);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .drawer-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 12px; }
        .drawer-key { color: var(--text); }
        .drawer-val { color: var(--text-bright); }
        .drawer-val.status-running { color: var(--accent); }
        .drawer-val.status-done { color: var(--green); }

        .code-block {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 10px 12px;
            font-size: 12px;
            line-height: 1.7;
            overflow-x: auto;
            white-space: pre;
            color: var(--text-bright);
        }

        .btn-row { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); }
        .btn {
            flex: 1;
            padding: 8px;
            font-family: inherit;
            font-size: 12px;
            border: 1px solid var(--border-light);
            background: var(--bg);
            color: var(--text);
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn:hover { border-color: var(--accent); color: var(--text-bright); }
        .btn.primary { border-color: var(--accent); color: var(--accent); }
        .btn.primary:hover { background: var(--accent-dim); color: var(--text-bright); }
        .btn.danger { border-color: var(--red); color: var(--red); }
        .btn.danger:hover { background: var(--red-dim); }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="header-left">
                <div class="header-title">Orchestra<span>OS</span></div>
                <div class="header-sub">Canvas v4 — Terminal</div>
            </div>
            <div class="tabs">
                <button class="tab active" onclick="setView('flow')">Flow</button>
                <button class="tab" onclick="setView('dag')">DAG</button>
                <button class="tab" onclick="setView('log')">Log</button>
                <button class="tab" onclick="setView('failures')">Failures</button>
            </div>
        </div>
        <div class="main">
            <div class="content" id="main-content"></div>
        </div>
        <div class="active-strip" id="active-strip"></div>
        <div class="input-bar">
            <span class="input-prompt">&gt;</span>
            <input type="text" class="input-field" id="cmd-input" placeholder="Descreva sua tarefa, ideia ou objetivo..." autocomplete="off" />
            <span class="input-prompt" style="color:var(--text-dim);">&#8629;</span>
        </div>
    </div>
    <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
    <div class="drawer" id="drawer">
        <div class="drawer-header">
            <span class="drawer-title" id="drawer-title">Session</span>
            <button class="drawer-close" onclick="closeDrawer()">&#10005;</button>
        </div>
        <div class="drawer-body" id="drawer-body"></div>
        <div class="btn-row" id="drawer-actions"></div>
    </div>
