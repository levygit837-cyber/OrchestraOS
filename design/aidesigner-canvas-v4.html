<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrchestraOS — Canvas v4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        bgMain: '#0A0A0A',
                        bgPanel: '#141414',
                        bgHover: '#1C1C1C',
                        bgCanvas: '#070707',
                        textPri: '#E7E5E4',
                        textSec: '#78716C',
                        accent: '#F59E0B',
                        accentLight: '#FBBF24',
                        semantic: {
                            success: '#22C55E',
                            error: '#EF4444',
                            warning: '#F97316',
                            info: '#A8A29E'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    boxShadow: {
                        'glow': '0 0 20px rgba(245,158,11,0.18)',
                        'glow-active': '0 0 35px rgba(245,158,11,0.35)',
                        'glow-panel': '0 8px 32px -8px rgba(0,0,0,0.7)',
                        'inner-border': 'inset 0 0 0 1px rgba(68,64,60,0.12)',
                        'inner-border-accent': 'inset 0 0 0 1px rgba(245,158,11,0.5)',
                        'float': '0 4px 24px rgba(0,0,0,0.5), 0 0 0 1px rgba(68,64,60,0.08)'
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'dash': 'dash 1s linear infinite',
                        'slide-up': 'slideUp 0.3s ease-out',
                        'slide-down': 'slideDown 0.3s ease-out',
                        'fade-in': 'fadeIn 0.2s ease-out',
                        'morph': 'morph 0.5s ease-out',
                        'particle-flow': 'particleFlow 1s ease-out forwards',
                    },
                    keyframes: {
                        dash: {
                            '0%': { strokeDashoffset: '24' },
                            '100%': { strokeDashoffset: '0' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(10px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        slideDown: {
                            '0%': { transform: 'translateY(-10px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        morph: {
                            '0%': { transform: 'scale(0.8)', opacity: '0' },
                            '50%': { transform: 'scale(1.05)' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        },
                        particleFlow: {
                            '0%': { transform: 'translate(0, 0)', opacity: '1' },
                            '100%': { transform: 'translate(var(--tx), var(--ty))', opacity: '0' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #070707;
            color: #E7E5E4;
        }
        .grid-bg {
            background-image:
                linear-gradient(rgba(68, 64, 60, 0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(68, 64, 60, 0.06) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .hud-panel {
            background: rgba(20, 20, 20, 0.88);
            backdrop-filter: blur(16px) saturate(1.2);
            -webkit-backdrop-filter: blur(16px) saturate(1.2);
            border: 1px solid rgba(68, 64, 60, 0.2);
            box-shadow: 0 4px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
        }

        /* ZONA 1 */
        .zone-1-flow {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 24px;
            overflow-x: auto;
        }
        .flow-arrow {
            width: 24px;
            height: 24px;
            color: #44403C;
            flex-shrink: 0;
        }
        .flow-arrow.active {
            color: #F59E0B;
            animation: pulse 1.5s infinite;
        }

        /* UserMessage Card */
        .user-message-card {
            min-width: 280px;
            max-width: 400px;
            border-radius: 12px;
            padding: 14px 16px;
            background: rgba(20, 20, 20, 0.9);
            border: 1px solid rgba(68, 64, 60, 0.25);
            transition: all 0.3s ease;
            position: relative;
        }
        .user-message-card.active {
            border-color: rgba(245, 158, 11, 0.5);
            box-shadow: 0 0 20px rgba(245,158,11,0.1);
        }
        .user-message-card.processing::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #F59E0B, transparent);
            animation: shimmer 1.5s infinite;
        }

        /* Orchestrator Hub */
        .orchestrator-hub {
            min-width: 220px;
            border-radius: 16px;
            padding: 16px 20px;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid rgba(68, 64, 60, 0.3);
            position: relative;
            transition: all 0.4s ease;
        }
        .orchestrator-hub.state-decomposing {
            border-color: rgba(245, 158, 11, 0.6);
            box-shadow: 0 0 30px rgba(245,158,11,0.15), inset 0 0 0 1px rgba(245,158,11,0.2);
        }
        .orchestrator-hub.state-spawning {
            border-color: rgba(34, 197, 94, 0.4);
            box-shadow: 0 0 30px rgba(34,197,94,0.1);
        }
        .orchestrator-hub.state-intervening {
            border-color: rgba(249, 115, 22, 0.6);
            box-shadow: 0 0 30px rgba(249,115,22,0.2);
            animation: pulse-border 2s infinite;
        }

        /* Task Card */
        .task-card {
            min-width: 260px;
            border-radius: 14px;
            padding: 16px 20px;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid rgba(68, 64, 60, 0.3);
            position: relative;
        }
        .task-card.state-active {
            border-color: rgba(245, 158, 11, 0.5);
            animation: morph 0.5s ease-out;
        }

        /* ZONA 2 - DAG */
        .dag-level {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-bottom: 48px;
            position: relative;
        }
        .dag-level::after {
            content: '';
            position: absolute;
            bottom: -32px;
            left: 50%;
            width: 1px;
            height: 32px;
            background: rgba(68, 64, 60, 0.3);
        }
        .dag-level:last-child::after {
            display: none;
        }
        .wu-node {
            width: 180px;
            border-radius: 12px;
            padding: 14px;
            background: rgba(20, 20, 20, 0.9);
            border: 1px solid rgba(68, 64, 60, 0.25);
            position: relative;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .wu-node:hover {
            transform: translateY(-3px);
            border-color: rgba(245, 158, 11, 0.3);
        }
        .wu-node.status-done {
            border-color: rgba(34, 197, 94, 0.4);
            border-left: 3px solid #22C55E;
        }
        .wu-node.status-running {
            border-color: rgba(245, 158, 11, 0.5);
            border-left: 3px solid #FBBF24;
            box-shadow: 0 0 15px rgba(245,158,11,0.1);
        }
        .wu-node.status-pending {
            border-left: 3px solid #44403C;
            opacity: 0.7;
        }
        .wu-node.status-failed {
            border-color: rgba(239, 68, 68, 0.4);
            border-left: 3px solid #EF4444;
        }

        /* DAG Edges */
        .dag-edge {
            position: absolute;
            stroke: rgba(68, 64, 60, 0.4);
            stroke-width: 1.5;
            fill: none;
            transition: stroke 0.3s ease;
        }
        .dag-edge.active {
            stroke: rgba(245, 158, 11, 0.6);
            stroke-dasharray: 6 3;
            animation: dash 1s linear infinite;
        }
        .dag-edge.done {
            stroke: rgba(34, 197, 94, 0.4);
        }

        /* ZONA 3 - Execution Stripes */
        .execution-stripe {
            display: flex;
            align-items: stretch;
            gap: 0;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 8px;
            background: rgba(20, 20, 20, 0.85);
            border: 1px solid rgba(68, 64, 60, 0.2);
            transition: all 0.3s ease;
            animation: slideUp 0.4s ease-out;
        }
        .execution-stripe:hover {
            border-color: rgba(245, 158, 11, 0.3);
        }
        .stripe-section {
            padding: 12px 16px;
            border-right: 1px solid rgba(68, 64, 60, 0.15);
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 120px;
        }
        .stripe-section:last-child {
            border-right: none;
        }
        .stripe-wu {
            background: rgba(245, 158, 11, 0.05);
        }
        .stripe-run {
            background: rgba(251, 191, 36, 0.05);
        }
        .stripe-session {
            background: rgba(34, 197, 94, 0.05);
        }
        .stripe-sandbox {
            background: rgba(168, 162, 158, 0.05);
            flex: 1;
        }

        /* Sandbox Container */
        .sandbox-container {
            border: 1px dashed rgba(68, 64, 60, 0.3);
            border-radius: 8px;
            padding: 8px 12px;
            position: relative;
        }
        .sandbox-container.state-creating {
            border-style: dashed;
            border-color: rgba(245, 158, 11, 0.4);
            animation: pulse-border 2s infinite;
        }
        .sandbox-container.state-running {
            border-style: solid;
            border-color: rgba(245, 158, 11, 0.4);
        }
        .sandbox-container.state-completed {
            border-style: solid;
            border-color: rgba(34, 197, 94, 0.4);
        }

        /* Particles */
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
        }
        .particle.heartbeat {
            background: #22C55E;
            box-shadow: 0 0 8px rgba(34,197,94,0.5);
        }
        .particle.tool-request {
            background: #F97316;
            box-shadow: 0 0 8px rgba(249,115,22,0.5);
        }
        .particle.checkpoint {
            background: #22C55E;
            box-shadow: 0 0 12px rgba(34,197,94,0.6);
        }

        /* Level connector lines */
        .level-connector {
            position: absolute;
            background: rgba(68, 64, 60, 0.2);
            z-index: 0;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        @keyframes pulse-border {
            0%, 100% { border-color: rgba(245, 158, 11, 0.3); }
            50% { border-color: rgba(245, 158, 11, 0.7); }
        }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(68, 64, 60, 0.4); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(68, 64, 60, 0.6); }

        /* Tooltip */
        .tooltip {
            position: absolute;
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid rgba(68, 64, 60, 0.3);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 11px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s ease;
            z-index: 1000;
            white-space: nowrap;
        }
        .tooltip.visible {
            opacity: 1;
        }
    </style>
</head>

    // ==================== RENDER ZONA 2: TASK GRAPH DAG ====================
    function renderZone2() {
        const levelsContainer = document.getElementById('dag-levels');

        const d = flowData.taskGraph;

        // Render levels
        let html = '';

            html += `<div class="dag-level" data-level="${levelIdx}">`;
            level.forEach(wu => {
                const statusClass = `status-${wu.status}`;
                const statusIcon = wu.status === 'completed' ? '✓' : wu.status === 'running' ? '▶' : wu.status === 'failed' ? '✕' : '○';
                const statusColor = wu.status === 'completed' ? 'text-semantic-success' : wu.status === 'running' ? 'text-accentLight' : wu.status === 'failed' ? 'text-semantic-error' : 'text-textSec';

                html += `
                    <div class="wu-node ${statusClass}" data-wu-id="${wu.id}" onclick="selectWU('${wu.id}')">
                        <div class="flex items-center justify-between mb-1.5">
                            <span class="text-[9px] font-mono text-textSec/60">${wu.id}</span>
                            <span class="text-[10px] ${statusColor}">${statusIcon}</span>
                        </div>
                        <p class="text-xs font-semibold text-white mb-1">${wu.title}</p>
                        <p class="text-[10px] text-textSec line-clamp-2 mb-2">${wu.objective}</p>
                        <div class="flex items-center gap-1.5">
                            <div class="flex-1 bg-[#1C1C1C] rounded-full h-1">
                                <div class="${wu.status === 'completed' ? 'bg-semantic-success' : 'bg-accentLight'} h-full rounded-full" style="width: ${wu.completion}%"></div>
                            </div>
                            <span class="text-[9px] font-mono text-textSec/60">${wu.completion}%</span>
                        </div>
                        ${wu.runAttempts ? `
                            <div class="mt-2 pt-2 border-t border-[#292524]/30">
                                <span class="text-[9px] font-mono text-textSec">${wu.runAttempts} attempt${wu.runAttempts > 1 ? 's' : ''}</span>
                            </div>
                        ` : ''}
                    </div>
                `;
            });
            html += '</div>';
        });
        levelsContainer.innerHTML = html;

        // Update stats
        const totalWUs = d.levels.flat().length;
        const totalLevels = d.levels.length;
        document.getElementById('dag-stats').textContent = `${totalWUs} WUs • ${totalLevels} levels`;

        // Draw edges (simplified — straight lines for now)
        setTimeout(() => drawDAGEdges(), 100);
    }

    function drawDAGEdges() {
        const svg = document.getElementById('dag-edges');
        const d = flowData.taskGraph;
        const container = document.getElementById('dag-levels');
        const containerRect = container.getBoundingClientRect();

        let svgHtml = '';
        d.edges.forEach(edge => {
            const fromEl = document.querySelector(`[data-wu-id="${edge.from}"]`);
            const toEl = document.querySelector(`[data-wu-id="${edge.to}"]`);
            if (!fromEl || !toEl) return;

            const fromRect = fromEl.getBoundingClientRect();
            const toRect = toEl.getBoundingClientRect();

            const x1 = fromRect.left + fromRect.width / 2 - containerRect.left;
            const y1 = fromRect.bottom - containerRect.top;
            const x2 = toRect.left + toRect.width / 2 - containerRect.left;
            const y2 = toRect.top - containerRect.top;

            const midY = (y1 + y2) / 2;
            const path = `M ${x1} ${y1} C ${x1} ${midY}, ${x2} ${midY}, ${x2} ${y2}`;

            const fromWU = d.levels.flat().find(w => w.id === edge.from);
            const edgeClass = fromWU && fromWU.status === 'completed' ? 'done' : '';

            svgHtml += `<path d="${path}" class="dag-edge ${edgeClass}" />`;
        });

        svg.innerHTML = svgHtml;
        svg.setAttribute('viewBox', `0 0 ${containerRect.width} ${containerRect.height}`);
    }

    // ==================== INTERACTIONS ====================
    function selectWU(wuId) {
        // Highlight the WU
        document.querySelectorAll('.wu-node').forEach(n => n.classList.remove('ring-2', 'ring-accent/50'));
        const el = document.querySelector(`[data-wu-id="${wuId}"]`);
        if (el) el.classList.add('ring-2', 'ring-accent/50');

        // Scroll to execution stripe if active
        // TODO: implement inspector panel
    }

    function setFilter(filter) {
        // Update button states
        document.querySelectorAll('#zone-1 .hud-panel button').forEach(btn => {
            btn.classList.toggle('bg-accent/15', btn.textContent.toLowerCase().includes(filter));
            btn.classList.toggle('text-accentLight', btn.textContent.toLowerCase().includes(filter));
            btn.classList.toggle('border-accent/20', btn.textContent.toLowerCase().includes(filter));
            btn.classList.toggle('text-textSec', !btn.textContent.toLowerCase().includes(filter));
        });

        // Apply filter logic
        if (filter === 'dag') {
            document.getElementById('zone-1').style.display = 'none';
            document.getElementById('zone-3').style.display = 'none';
            document.getElementById('zone-2').style.flex = '1';
        } else if (filter === 'active') {
            document.getElementById('zone-1').style.display = 'none';
            document.getElementById('zone-2').style.display = 'none';
            document.getElementById('zone-3').style.maxHeight = 'none';
            document.getElementById('zone-3').style.flex = '1';
        } else if (filter === 'failures') {
            // Show only failed WUs
            document.querySelectorAll('.wu-node').forEach(n => {
                const isFailed = n.classList.contains('status-failed');
                n.style.opacity = isFailed ? '1' : '0.2';
            });
        } else {
            // flow — show all
            document.getElementById('zone-1').style.display = '';
            document.getElementById('zone-2').style.display = '';
            document.getElementById('zone-3').style.display = '';
            document.getElementById('zone-2').style.flex = '1';
            document.getElementById('zone-3').style.maxHeight = '35vh';
            document.getElementById('zone-3').style.flex = '';
            document.querySelectorAll('.wu-node').forEach(n => n.style.opacity = '1');
        }
    }

    // ==================== TOOLTIP ====================
    const tooltip = document.getElementById('tooltip');
    document.addEventListener('mouseover', (e) => {
        const trigger = e.target.closest('[data-tooltip]');
        if (trigger) {
            tooltip.textContent = trigger.dataset.tooltip;
            tooltip.classList.add('visible');
            const rect = trigger.getBoundingClientRect();
            tooltip.style.left = rect.left + 'px';
            tooltip.style.top = (rect.bottom + 4) + 'px';
        }
    });
    document.addEventListener('mouseout', (e) => {
        if (e.target.closest('[data-tooltip]')) {
            tooltip.classList.remove('visible');
        }
    });

    // ==================== INIT ====================
    window.addEventListener('load', () => {
        renderZone1();
        renderZone2();
        renderZone3();

        // Redraw edges on resize
        window.addEventListener('resize', () => {
            drawDAGEdges();
        });
    });
